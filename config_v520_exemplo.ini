# =============================================================================
# SNIPER PHOENIX v5.2.0 - CONFIGURAÇÃO COM DETECTOR HÍBRIDO
# =============================================================================

[binance]
api_key = sua_api_key_aqui
secret = sua_secret_aqui

[trading]
symbol = PAXG/USDT

capital_base = 14.75
max_safety_orders = 3

dca_volume_scale = 1.5
dca_step_initial = 0.02
dca_step_scale = 1.3

trailing_trigger = 0.015
trailing_dist = 0.006
stop_loss_usd = 10.0

atr_period = 14
atr_multiplicador = 1.5

rsi_max_entrada = 65.0
rsi_period = 14

volume_fator_min = 1.2

cb_queda_pct = 3.0
cb_janela_velas = 5

# =============================================================================
# [M6] DETECTOR DE VELAS (componente 1h do Híbrido — peso 1.0)
# =============================================================================
[anomaly]
enabled = true

# Thresholds para velas 1h (mais conservadores que RT)
price_spike_threshold = 0.005     # 0.5% (PAXG) | 1.0% (BTC/ETH)
volume_spike_threshold = 5.0
trades_spike_threshold = 10.0
lookback_candles = 20

# Confiança mínima (usada pelo HybridDetector também)
emergency_sell_min_confidence = 0.70
emergency_buy_min_confidence = 0.80

# =============================================================================
# [HIBRIDO] DETECTOR EM TEMPO REAL + HÍBRIDO INTELIGENTE
# =============================================================================
[hybrid]
# Ativa/desativa o sistema híbrido completo
# Se false: usa somente o detector de velas 1h (comportamento v5.1.0)
enabled = true

# --- Detector em Tempo Real (RT) ---
# Minutos de histórico necessários para baseline do RT
# Durante esse período o RT não age, apenas aprende
# Padrão: 60 min | Mínimo recomendado: 30 min
rt_baseline_minutes = 60

# Spike mínimo de preço para detecção RT
# Menor que o detector de velas pois ticks são mais granulares
# PAXG: 0.003 (0.3%) | BTC/ETH: 0.005 (0.5%) | Altcoins: 0.008 (0.8%)
rt_price_spike_threshold = 0.003

# Volume deve ser X× a média dos minutos anteriores
# RT usa janelas de minutos (não horas), então menor que detector de velas
# PAXG: 3.0 | BTC/ETH: 5.0 | Altcoins: 8.0
rt_volume_spike_threshold = 3.0

# Velocidade mínima de mudança de preço (% por segundo)
# Detecta movimentos muito rápidos mesmo sem volume anômalo
# 0.001 = 0.1%/seg | 0.002 = 0.2%/seg (mais conservador)
rt_velocity_threshold = 0.001

# --- Lógica de Venda Parcial (quando só RT detecta) ---
# Fração da posição vendida imediatamente ao sinal RT-only (0.0 a 1.0)
# 0.50 = vende 50% instantaneamente, aguarda confirmação da vela 1h para o restante
# 0.30 = mais conservador (vende menos de imediato)
# 1.00 = comportamento agressivo: vende tudo no sinal RT (sem esperar 1h)
partial_sell_ratio = 0.50

# Tempo máximo (segundos) para aguardar confirmação da vela 1h após venda parcial
# Se timeout expirar: vende o restante independente da confirmação
# 300 = 5 minutos (padrão) | 180 = 3 min (mais agressivo) | 600 = 10 min (conservador)
partial_sell_timeout_sec = 300

# =============================================================================
# AJUSTES POR ATIVO (substitua a seção [hybrid] conforme necessário)
# =============================================================================
#
# PAXG (baixa volatilidade — config atual acima):
#   rt_price_spike_threshold = 0.003
#   rt_volume_spike_threshold = 3.0
#   rt_velocity_threshold = 0.001
#   partial_sell_ratio = 0.50
#
# BTC/ETH (média volatilidade):
#   rt_price_spike_threshold = 0.005
#   rt_volume_spike_threshold = 5.0
#   rt_velocity_threshold = 0.002
#   partial_sell_ratio = 0.60
#
# Altcoins (alta volatilidade — mais conservador):
#   rt_price_spike_threshold = 0.008
#   rt_volume_spike_threshold = 8.0
#   rt_velocity_threshold = 0.003
#   partial_sell_ratio = 0.40
#
# =============================================================================
# COMO O DETECTOR HÍBRIDO DECIDE
# =============================================================================
#
# CENÁRIO 1 — Apenas RT detecta pump (confiança ≥ 70% × 0.6 = 42%):
#   → Vende `partial_sell_ratio` (50%) imediatamente
#   → Aguarda até `partial_sell_timeout_sec` (300s)
#   → Se vela 1h confirma: vende restante
#   → Se timeout: vende restante de qualquer forma
#   → Se preço recupera (falso positivo): restante segue via trailing normal
#
# CENÁRIO 2 — Apenas vela 1h detecta pump (confiança ≥ 70%):
#   → Vende 100% imediatamente (comportamento idêntico ao v5.1.0)
#
# CENÁRIO 3 — RT + vela 1h detectam simultaneamente:
#   → Score combinado (RT × 0.6 + 1h × 1.0, cap 1.0)
#   → Vende 100% imediatamente com score reforçado
#
# CENÁRIO 4 — Flash Crash (compra de emergência):
#   → RT detecta crash: compra imediatamente se score ≥ 80%
#   → Vela 1h detecta crash: compra imediatamente (igual v5.1.0)
#   → Ambos detectam: score somado, compra com mais confiança
#
# =============================================================================
# FASES DE TESTE RECOMENDADAS
# =============================================================================
#
# FASE 1 — Log-only RT (1 semana): defina enabled = false em [hybrid]
#   O bot roda no modo v5.1.0. Verifique os logs do RT:
#   grep "RT FLASH PUMP" sniper_system.log
#
# FASE 2 — Partial conservador (2 semanas):
#   partial_sell_ratio = 0.30
#   rt_price_spike_threshold = 0.005  (mais alto = menos sensível)
#
# FASE 3 — Padrão recomendado:
#   partial_sell_ratio = 0.50
#   rt_price_spike_threshold = 0.003
#
# FASE 4 — Agressivo (quando tiver dados suficientes):
#   partial_sell_ratio = 0.70
#   partial_sell_timeout_sec = 180
#
# =============================================================================
