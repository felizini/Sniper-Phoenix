# =============================================================================
# SNIPER PHOENIX v5.1.0 - CONFIGURAÇÃO
# =============================================================================

[binance]
api_key = sua_api_key_aqui
secret = sua_secret_aqui

[trading]
# Par de negociação
symbol = BTC/USDT

# Capital
capital_base = 14.75          # Valor da primeira ordem ($)
max_safety_orders = 3         # Quantas ordens DCA (máximo)

# DCA (Dollar Cost Averaging)
dca_volume_scale = 1.5        # Multiplicador de volume (cada ordem é 1.5× maior)
dca_step_initial = 0.02       # Queda mínima para primeira SO (2%)
dca_step_scale = 1.3          # Escala de crescimento entre SOs

# Saída
trailing_trigger = 0.015      # Gatilho para ativar trailing (1.5%)
trailing_dist = 0.006         # Distância mínima do trailing (0.6%)
stop_loss_usd = 10.0          # Stop loss em USD (prejuízo máximo por ciclo)

# [M5] ATR (Average True Range) - Trailing adaptativo
atr_period = 14               # Período do ATR
atr_multiplicador = 1.5       # Multiplicador do ATR para trailing

# [M1] Filtro RSI
rsi_max_entrada = 65.0        # RSI máximo para entrada (evita sobrecompra)
rsi_period = 14               # Período do RSI

# [M2] Filtro de Volume
volume_fator_min = 1.2        # Volume mínimo vs média (1.2× = 20% acima)

# [M3] Circuit Breaker
cb_queda_pct = 3.0            # Pausa entradas se mercado cair > 3% em 4h
cb_janela_velas = 5           # Janela de análise (5 velas de 4h = 20h)

# =============================================================================
# [M6] DETECTOR DE ANOMALIAS - NOVO EM v5.1.0
# =============================================================================
[anomaly]
# Ativa/desativa o detector de flash pumps e flash crashes
enabled = true

# --- Thresholds de Detecção ---
# Spike mínimo de preço para considerar anomalia
# 0.005 = 0.5% (recomendado para PAXG)
# 0.010 = 1.0% (recomendado para BTC/ETH)
price_spike_threshold = 0.005

# Volume deve ser X vezes maior que a média
# 5.0 = 5× a média (recomendado para PAXG)
# 8.0 = 8× a média (recomendado para BTC volátil)
volume_spike_threshold = 5.0

# Número de trades deve ser X vezes maior
# 10.0 = 10× a média (padrão)
# 15.0 = mais conservador (menos alertas)
trades_spike_threshold = 10.0

# Janela de análise (quantas velas usar para baseline)
# 20 = últimas 20 velas de 1h (recomendado)
lookback_candles = 20

# --- Confiança Mínima para Ação ---
# Venda de emergência em flash pump (0-1)
# 0.70 = 70% confiança (padrão - equilibrado)
# 0.80 = 80% confiança (mais conservador)
# 0.60 = 60% confiança (mais agressivo)
emergency_sell_min_confidence = 0.70

# Compra de emergência em flash crash (0-1)
# 0.80 = 80% confiança (padrão - conservador)
# 0.85 = 85% confiança (muito conservador)
# 0.75 = 75% confiança (menos conservador)
emergency_buy_min_confidence = 0.80

# =============================================================================
# NOTAS SOBRE O DETECTOR DE ANOMALIAS
# =============================================================================
#
# O QUE FAZ:
# - Detecta picos anômalos de preço (flash pumps) em tempo real
# - Detecta quedas anômalas (flash crashes) instantaneamente
# - Vende IMEDIATAMENTE em flash pumps (ignora trailing, captura no pico)
# - Compra IMEDIATAMENTE em flash crashes (compra no fundo)
#
# QUANDO ATUA:
# - Flash Pump detectado + Em posição + Lucro ≥ 0% + Confiança ≥ 70%
#   → VENDA DE EMERGÊNCIA (ignora todas as regras normais)
#
# - Flash Crash detectado + Sem posição + Capital disponível + Confiança ≥ 80%
#   → COMPRA DE EMERGÊNCIA (ignora MTF, RSI, volume)
#
# AJUSTES POR ATIVO:
#
# PAXG (baixa volatilidade):
#   price_spike_threshold = 0.005 (0.5%)
#   volume_spike_threshold = 5.0
#   trades_spike_threshold = 10.0
#
# BTC/ETH (média volatilidade):
#   price_spike_threshold = 0.010 (1.0%)
#   volume_spike_threshold = 8.0
#   trades_spike_threshold = 15.0
#
# ALTCOINS (alta volatilidade):
#   price_spike_threshold = 0.020 (2.0%)
#   volume_spike_threshold = 15.0
#   trades_spike_threshold = 30.0
#
# FREQUÊNCIA ESPERADA:
# - Flash pumps: 2-4 por mês (PAXG), 5-10 por mês (BTC)
# - Flash crashes: 1-2 por mês
# - Falsos positivos: < 1% (filtrado pela confiança mínima)
#
# RETORNO ADICIONAL ESTIMADO:
# - +2-4% em 6 meses (capturaflash pumps perdidos pelo trailing)
#
# =============================================================================
