# =============================================================================
# SNIPER PHOENIX v5.2.1 - CONFIGURAÇÃO COM DETECTOR HÍBRIDO
# =============================================================================

[binance]
api_key = sua_api_key_aqui
secret = sua_secret_aqui

[trading]
symbol = PAXG/USDT

capital_base = 14.75
max_safety_orders = 3

dca_volume_scale = 1.5
dca_step_initial = 0.02
dca_step_scale = 1.3

trailing_trigger = 0.015
trailing_dist = 0.006
stop_loss_usd = 10.0

atr_period = 14
atr_multiplicador = 1.5

# =============================================================================
# [v5.2.1] FLAGS DE ATIVAÇÃO DOS FILTROS
# Cada filtro pode ser ligado/desligado independentemente.
# Suportam hot-reload via menu opção 2 (Ctrl+C) sem reiniciar o bot.
# =============================================================================

# [M1] Filtro RSI
# true  → bloqueia entrada se RSI(1h) >= rsi_max_entrada
# false → RSI ainda é calculado e exibido no dashboard, mas NÃO bloqueia entrada
filtro_rsi_ativo = true
rsi_max_entrada = 65.0
rsi_period = 14

# [M2] Filtro de Volume
# true  → exige volume atual >= volume_fator_min × média 20 velas
# false → ignora volume completamente na decisão de entrada
filtro_volume_ativo = true
volume_fator_min = 1.2

# [M3] Circuit Breaker
# true  → pausa entradas se mercado cair > cb_queda_pct% em cb_janela_velas velas de 4h
# false → quedas de mercado NÃO pausam entradas; nenhuma chamada à API de 4h é feita
circuit_breaker_ativo = true
cb_queda_pct = 3.0
cb_janela_velas = 5

# =============================================================================
# [M6] DETECTOR DE VELAS (componente 1h do Híbrido — peso 1.0)
# =============================================================================
[anomaly]
enabled = true

# Thresholds para velas 1h (mais conservadores que RT)
price_spike_threshold = 0.005     # 0.5% (PAXG) | 1.0% (BTC/ETH)
volume_spike_threshold = 5.0
trades_spike_threshold = 10.0
lookback_candles = 20

# Confiança mínima (usada pelo HybridDetector também)
emergency_sell_min_confidence = 0.70
emergency_buy_min_confidence = 0.80

# =============================================================================
# [HIBRIDO] DETECTOR EM TEMPO REAL + HÍBRIDO INTELIGENTE
# =============================================================================
[hybrid]
# Ativa/desativa o sistema híbrido completo
# Se false: usa somente o detector de velas 1h (comportamento v5.1.0)
enabled = true

# --- Detector em Tempo Real (RT) ---
rt_baseline_minutes = 60
rt_price_spike_threshold = 0.003
rt_volume_spike_threshold = 3.0
rt_velocity_threshold = 0.001

# --- Lógica de Venda Parcial ---
partial_sell_ratio = 0.50
partial_sell_timeout_sec = 300

# =============================================================================
# REFERÊNCIA RÁPIDA — FLAGS DE FILTRO
# =============================================================================
#
# COMPORTAMENTO quando flag = false:
#
#   filtro_rsi_ativo = false
#     → RSI continua sendo calculado a cada 30s (exibido no dashboard)
#     → Entrada NÃO é bloqueada mesmo com RSI >= rsi_max_entrada
#     → Útil em períodos de mercado em tendência forte (RSI cronicamente alto)
#
#   filtro_volume_ativo = false
#     → Volume não é verificado antes de abrir posição
#     → Útil em ativos de baixa liquidez ou fora do horário de pico
#
#   circuit_breaker_ativo = false
#     → shared_state["circuit_breaker"] forçado a False
#     → Nenhuma chamada fetch_ohlcv de 4h para verificar queda
#     → Útil quando se quer operar mesmo em mercados em queda controlada
#
# COMBINAÇÕES COMUNS:
#
#   Modo agressivo (ignora todos os filtros de entrada):
#     filtro_rsi_ativo = false
#     filtro_volume_ativo = false
#     circuit_breaker_ativo = false
#
#   Modo conservador padrão (recomendado):
#     filtro_rsi_ativo = true
#     filtro_volume_ativo = true
#     circuit_breaker_ativo = true
#
#   Modo semi-agressivo (só RSI bloqueia, sem CB):
#     filtro_rsi_ativo = true
#     filtro_volume_ativo = false
#     circuit_breaker_ativo = false
#
# =============================================================================
# AJUSTES POR ATIVO
# =============================================================================
#
# PAXG (baixa volatilidade — config atual acima):
#   rt_price_spike_threshold = 0.003
#   rt_volume_spike_threshold = 3.0
#   rt_velocity_threshold = 0.001
#   partial_sell_ratio = 0.50
#
# BTC/ETH (média volatilidade):
#   rt_price_spike_threshold = 0.005
#   rt_volume_spike_threshold = 5.0
#   rt_velocity_threshold = 0.002
#   partial_sell_ratio = 0.60
#
# Altcoins (alta volatilidade — mais conservador):
#   rt_price_spike_threshold = 0.008
#   rt_volume_spike_threshold = 8.0
#   rt_velocity_threshold = 0.003
#   partial_sell_ratio = 0.40
#
# =============================================================================
